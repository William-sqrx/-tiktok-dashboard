# Render blueprint — deploys the whole app in one shot.
# Docs: https://render.com/docs/blueprint-spec
#
# After the first deploy, set the secret env vars (marked `sync: false`) in the
# Render dashboard, then add your app's URL as the TikTok Redirect URI.
services:
  - type: web
    name: tiktok-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: TIKTOK_CLIENT_KEY
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false
      # Set both of these to your live Render URL after the first deploy, e.g.
      #   https://tiktok-dashboard.onrender.com
      - key: TIKTOK_REDIRECT_URI
        sync: false   # e.g. https://<app>.onrender.com/api/auth/tiktok/callback
      - key: FRONTEND_URL
        sync: false   # e.g. https://<app>.onrender.com
      - key: ENCRYPTION_KEY
        sync: false   # generate with the Fernet one-liner in the README
      - key: TIKTOK_SCOPES
        value: user.info.basic,user.info.stats,video.list
      - key: DATABASE_URL
        fromDatabase:
          name: tiktok-db
          property: connectionString

  # Runs the sync every 6 hours so stats/videos stay fresh without you clicking.
  - type: cron
    name: tiktok-sync
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    schedule: "0 */6 * * *"
    dockerCommand: >-
      python -c "import os,urllib.request;
      urllib.request.urlopen(urllib.request.Request(os.environ['APP_URL'].rstrip('/')+'/api/sync', method='POST'), timeout=120)"
    envVars:
      - key: APP_URL
        sync: false   # your live Render URL, e.g. https://<app>.onrender.com

databases:
  - name: tiktok-db
    plan: free
