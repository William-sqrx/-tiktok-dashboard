# Render blueprint — deploys the whole app in one shot.
# Docs: https://render.com/docs/blueprint-spec
#
# After the first deploy, set the secret env vars (marked `sync: false`) in the
# Render dashboard, then add your app's URL as the TikTok Redirect URI.
services:
  - type: web
    name: tiktok-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: TIKTOK_CLIENT_KEY
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false
      # Set both of these to your live Render URL after the first deploy, e.g.
      #   https://tiktok-dashboard.onrender.com
      - key: TIKTOK_REDIRECT_URI
        sync: false   # e.g. https://<app>.onrender.com/api/auth/tiktok/callback
      - key: FRONTEND_URL
        sync: false   # e.g. https://<app>.onrender.com
      - key: ENCRYPTION_KEY
        sync: false   # generate with the Fernet one-liner in the README
      - key: TIKTOK_SCOPES
        value: user.info.basic,user.info.stats,video.list
      - key: DATABASE_URL
        fromDatabase:
          name: tiktok-db
          property: connectionString

# NOTE: Render's free plan does NOT include cron jobs, so the scheduled sync
# lives in GitHub Actions instead — see .github/workflows/sync.yml. If you
# upgrade to a paid plan you can move it back here as a `type: cron` service.

databases:
  - name: tiktok-db
    plan: free
